apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-secret
  namespace: forgejo
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: forgejo-runner-secret
    creationPolicy: Owner
    template:
      data:
        token: "{{ .runner_token }}"
        uuid: "{{ .runner_uuid }}"
  dataFrom:
    - extract:
        key: forgejo
