apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-db-secret
  namespace: forgejo
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: forgejo-db-secret
    template:
      data:
        username: "forgejo"
        password: "{{ .db_password }}"
  dataFrom:
    - extract:
        key: forgejo
