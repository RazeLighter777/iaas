---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 15m
  chart:
    spec:
      chart: forgejo
      version: "17.1.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  values:
    strategy:
      type: Recreate

    image:
      rootless: true

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: LoadBalancer
        loadBalancerIP: ${forgejo_ssh_lb_ip}
        port: 22
        externalTrafficPolicy: Local

    ingress:
      enabled: false

    persistence:
      enabled: true
      create: true
      claimName: forgejo-data
      size: 50Gi
      storageClass: longhorn-fast
      accessModes:
        - ReadWriteOnce

    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false

    gitea:
      admin:
        existingSecret: forgejo-admin
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db-secret
              key: password
        - name: FORGEJO__SECURITY__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: SECRET_KEY
        - name: FORGEJO__SECURITY__INTERNAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: INTERNAL_TOKEN
        - name: FORGEJO__OAUTH2__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: JWT_SECRET
        - name: FORGEJO__SERVER__LFS_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: LFS_JWT_SECRET
      oauth:
        - name: "Authentik"
          provider: "openidConnect"
          existingSecret: forgejo-oauth
          autoDiscoverUrl: "https://authentik.${domain_name}/application/o/forgejo/.well-known/openid-configuration"
          scopes: "openid profile email groups"
          groupClaimName: "groups"
          adminGroup: "forgejo-admins"
      config:
        APP_NAME: "Forgejo"
        server:
          DOMAIN: git.${domain_name}
          ROOT_URL: https://git.${domain_name}
          SSH_DOMAIN: git.${domain_name}
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
          START_SSH_SERVER: true
          OFFLINE_MODE: true
          LANDING_PAGE: explore
        database:
          DB_TYPE: postgres
          HOST: forgejo-postgres-rw.forgejo.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo
        service:
          DISABLE_REGISTRATION: true
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
          ENABLE_NOTIFY_MAIL: false
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          USERNAME: nickname
          UPDATE_AVATAR: true
          ACCOUNT_LINKING: auto
        repository:
          DEFAULT_BRANCH: master
        security:
          INSTALL_LOCK: true
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: "redis://valkey.forgejo.svc.cluster.local:6379/0"
        cache:
          ADAPTER: redis
          HOST: "redis://valkey.forgejo.svc.cluster.local:6379/0"
        queue:
          TYPE: redis
          CONN_STR: "redis://valkey.forgejo.svc.cluster.local:6379/0"
        metrics:
          ENABLED: true
        log:
          LEVEL: info
          MODE: console
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: github

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi

    actions:
      enabled: true
