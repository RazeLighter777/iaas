apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
  namespace: forgejo
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: forgejo-admin
    creationPolicy: Owner
    template:
      data:
        username: "forgejo_admin"
        password: "{{ .admin_password }}"
        email: "admin@prizrak.me"
  dataFrom:
    - extract:
        key: forgejo
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oauth
  namespace: forgejo
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: forgejo-oauth
    creationPolicy: Owner
    template:
      data:
        key: "{{ .oidc_client_id }}"
        secret: "{{ .oidc_client_secret }}"
  dataFrom:
    - extract:
        key: forgejo
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-secrets
  namespace: forgejo
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: forgejo-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: forgejo
        property: secret_key
    - secretKey: INTERNAL_TOKEN
      remoteRef:
        key: forgejo
        property: internal_token
    - secretKey: LFS_JWT_SECRET
      remoteRef:
        key: forgejo
        property: lfs_jwt_secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: forgejo
        property: jwt_secret
    - secretKey: SMTP_USER
      remoteRef:
        key: forgejo
        property: smtp_user
    - secretKey: SMTP_PASSWD
      remoteRef:
        key: forgejo
        property: smtp_passwd
