---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 5m0s
  dependsOn:
    - name: istio-base
      namespace: istio-system
  chart:
    spec:
      chart: istiod
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      version: "1.30.0"
  values:
    profile: ambient
    env:
      PILOT_ENABLE_ALPHA_GATEWAY_API: "true"
    meshConfig:
      # JSON access log provider consumed by the CrowdSec Telemetry resource
      # in cluster/infrastructure/crowdsec/app/istio-integration/. The format
      # mirrors the Envoy default fields but emits structured JSON so the
      # CrowdSec custom parser can extract source_ip / status / path.
      defaultProviders:
        accessLogging: []
      extensionProviders:
        - name: "envoy-json"
          envoyFileAccessLog:
            path: /dev/stdout
            logFormat:
              labels:
                start_time: "%START_TIME%"
                method: "%REQ(:METHOD)%"
                path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                protocol: "%PROTOCOL%"
                response_code: "%RESPONSE_CODE%"
                response_flags: "%RESPONSE_FLAGS%"
                bytes_received: "%BYTES_RECEIVED%"
                bytes_sent: "%BYTES_SENT%"
                duration: "%DURATION%"
                upstream_service_time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
                x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
                user_agent: "%REQ(USER-AGENT)%"
                request_id: "%REQ(X-REQUEST-ID)%"
                authority: "%REQ(:AUTHORITY)%"
                upstream_host: "%UPSTREAM_HOST%"
                downstream_remote_address: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
        - name: "authentik"
          envoyExtAuthzHttp:
            service: "ak-outpost-proxy-outpost.authentik.svc.cluster.local"
            port: "9000"
            pathPrefix: "/outpost.goauthentik.io/auth/envoy"
            headersToDownstreamOnAllow:
              - cookie
            headersToUpstreamOnAllow:
              - set-cookie
              - X-Authentik-Email
              - X-Authentik-Entitlements
              - X-Authentik-Groups
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-Version
              - X-Authentik-Name
              - X-Authentik-Uid
              - X-Authentik-Username
            includeRequestHeadersInCheck:
              - cookie
              - Origin
