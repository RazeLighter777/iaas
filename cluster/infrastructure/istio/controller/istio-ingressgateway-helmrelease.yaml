---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingressgateway
  namespace: istio-ingress
spec:
  interval: 5m0s
  dependsOn:
    - name: istiod
      namespace: istio-system
  chart:
    spec:
      chart: gateway
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      version: "1.30.0"
  values:
    labels:
      istio: ingressgateway
    service:
      type: LoadBalancer
      loadBalancerIP: ${ingress_ip}
      externalIPs:
        - ${ingress_ip}
      loadBalancerClass: "io.cilium/l2-announcer"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1024Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "15090"
      prometheus.io/path: "/stats/prometheus"
      # Trust exactly 1 proxy hop in front of the gateway (cloudflared, for
      # WAN traffic). Sets envoy.xff_num_trusted_hops=1 natively without
      # conflicting with Istio's default use_remote_address:true. LAN-direct
      # traffic has no XFF so the L4 source IP is used as-is.
      proxy.istio.io/config: |
        gatewayTopology:
          numTrustedProxies: 1
