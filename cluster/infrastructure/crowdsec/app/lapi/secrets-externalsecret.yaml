# Shared LAPI secrets used across both LAPI replicas + agents + bouncers.
# Populated from Vault `crowdsec` entry, managed by terraform/vault/crowdsec.tf.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-lapi-shared
  namespace: crowdsec
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: crowdsec-lapi-shared
    creationPolicy: Owner
    template:
      data:
        csLapiSecret: "{{ .cs_lapi_secret }}"
        registrationToken: "{{ .registration_token }}"
        enrollKey: "{{ .console_enroll_key }}"
  dataFrom:
    - extract:
        key: crowdsec
