# Renders the entire cs-cloudflare-worker-bouncer cfg.yaml from Vault.
# Vault `crowdsec` entry managed by terraform/vault/crowdsec.tf.
# LAPI auth uses a TLS client cert mounted from the chart-generated bouncer
# secret, not an API key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-cf-worker-bouncer
  namespace: crowdsec
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: crowdsec-cf-worker-bouncer
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        cfg.yaml: |
          crowdsec_config:
            lapi_url: https://crowdsec-service.crowdsec.svc.cluster.local:8080/
            lapi_key: ""
            update_frequency: 10s
            include_scenarios_containing: []
            exclude_scenarios_containing: []
            only_include_decisions_from: []
            insecure_skip_verify: false
            key_path: /etc/crowdsec-bouncer/tls/tls.key
            cert_path: /etc/crowdsec-bouncer/tls/tls.crt
            ca_cert_path: /etc/crowdsec-bouncer/tls/ca.crt

          cloudflare_config:
            accounts:
              - id: "{{ .cf_account_id }}"
                token: "{{ .cf_workers_bouncer_token }}"
                account_name: prizrak
                zones:
                  - zone_id: "{{ .cf_zone_id }}"
                    actions:
                      - block
                      - captcha
                    default_action: block
                    routes_to_protect: []
                    turnstile:
                      enabled: false

          log_level: info
          log_media: stdout

          prometheus:
            enabled: true
            listen_addr: 0.0.0.0
            listen_port: "2112"
  dataFrom:
    - extract:
        key: crowdsec
