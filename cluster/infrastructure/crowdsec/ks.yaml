# yaml-language-server: $schema = "https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crowdsec
  namespace: flux-system
spec:
  # No targetNamespace -- istio-integration/ resources need to land in
  # istio-system, and every other manifest sets its own namespace.
  dependsOn:
    - name: cloudnative
    - name: kube-prometheus-stack
    - name: external-secrets-crs
    - name: istio-crs
  wait: true
  interval: 1h
  path: "./cluster/infrastructure/crowdsec/app"
  prune: true
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
